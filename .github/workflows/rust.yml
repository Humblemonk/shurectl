name: Rust
permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            sys-deps: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev
          - os: macos-latest
            sys-deps: ""

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Install system dependencies
      if: matrix.sys-deps != ''
      run: ${{ matrix.sys-deps }}

    - name: Build
      run: cargo build --verbose

    - name: Run tests
      run: cargo test --verbose
